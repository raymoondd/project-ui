<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StudyFlow</title>
    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="main.png">

    <link rel="icon" type="image/png" sizes="48x48" href="main.png">

</head>

<body>

<div class="contact-form">
    
    <button id="contact" onclick="contact()">Contact Me</button>
    
    <p id="contactInfo" style="display:none;">
    Email: raysancho2006@gmail.com <br>
    Phone: 0000000000
</p>

</div>
    
    <div class="form-container">

      <img src="main.jpg" alt="Logo" class="logo" id="logo">

      <h2>Welcome Back</h2>

    <div class="input-box">
        <input type="text" id="firstname" required>
        <label>First Name</label>
    </div>

    <div class="input-box">
        <input type="password" id="password" required>
        <label>Password</label>

    </div>

    <p id="message"></p>
    <button onclick="login()">Login</button>
    
    <!-- Add this inside your HTML body -->
<div id="customAlert" style="display:none;">
    
    <span id="alertText"></span>
    
    <div style="margin-top:20px;">
        
        <button onclick="closeAlert()">OK</button>
    
    </div>
</div>
    
</div>
            
<script src="server.js"></script>

</body>
</html>
